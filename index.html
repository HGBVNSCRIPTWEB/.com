<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HGB VN • Roblox Script Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 10%, #0a0c1a, #02030a);
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Poppins', sans-serif;
      color: #eef3ff;
      padding: 0;
      overflow-x: hidden;
    }

    /* glass effect */
    .glass {
      background: rgba(8, 12, 28, 0.7);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 180, 60, 0.25);
      border-radius: 2rem;
    }

    /* login container */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem 2.2rem;
      text-align: center;
      transition: 0.2s;
    }

    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.8rem;
    }

    .monkey-logo {
      font-size: 4rem;
      filter: drop-shadow(0 0 8px #ffa600);
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFDA7C, #FF9F2E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: #ffcf8a;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 30px;
      display: inline-block;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 180, 70, 0.5);
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      outline: none;
      margin-top: 12px;
    }

    input:focus {
      border-color: #FFB347;
      box-shadow: 0 0 0 2px rgba(255, 180, 70, 0.3);
    }

    .btn-gold {
      background: linear-gradient(105deg, #FFA41F, #FF7A00);
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      color: #0a0c18;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: 0.2s;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .btn-outline-light {
      background: transparent;
      border: 1px solid #FFA41F;
      color: #FFD966;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .error-text {
      color: #ff8a6e;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    /* dashboard */
    .dashboard {
      display: none;
      padding: 1rem 1rem 2rem;
      max-width: 100%;
      overflow-x: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(5, 7, 20, 0.7);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 60px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 165, 40, 0.3);
    }

    .logo-small {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-small span {
      font-size: 2rem;
    }

    .logo-small h3 {
      font-size: 1.3rem;
      background: linear-gradient(145deg, #FFD966, #FFA123);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.4);
      padding: 5px 14px;
      border-radius: 40px;
    }

    .admin-tag {
      background: #FF7A2C;
      color: #0b0b16;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 30px;
    }

    .guest-tag {
      background: #2a2f4e;
      color: #ddd;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 20px 0 12px 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .script-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 8px;
    }

    .script-card {
      background: rgba(10, 12, 28, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border-left: 4px solid #FFA41F;
      width: 100%;
      word-break: break-word;
    }

    .script-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .script-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #FFE0A3;
    }

    .script-desc {
      font-size: 0.8rem;
      color: #b9ceff;
      margin: 6px 0 12px;
    }

    .code-area {
      background: #01010ce0;
      padding: 12px;
      border-radius: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 170px;
      overflow-y: auto;
      border: 1px solid rgba(255, 170, 60, 0.3);
    }

    .card-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 14px;
    }

    .btn-copy {
      background: #262d4a;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      color: #ffde9e;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .btn-delete-script {
      background: rgba(200, 60, 50, 0.2);
      border: 1px solid #ff6a55;
      color: #ff8f77;
      padding: 6px 14px;
      border-radius: 30px;
    }

    /* admin panel */
    .admin-panel {
      margin-top: 28px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.3rem;
      width: 100%;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    textarea {
      background: #0c1022;
      border: 1px solid #ffa41f70;
      border-radius: 1rem;
      padding: 12px;
      color: white;
      font-family: monospace;
      font-size: 0.8rem;
    }

    .row-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .log-box {
      margin-top: 18px;
      background: #03050ecc;
      border-radius: 1.2rem;
      padding: 1rem;
    }

    .log-item {
      font-size: 0.7rem;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 170, 60, 0.2);
      color: #cddeff;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1f2ee6;
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 60px;
      color: #FFD966;
      font-weight: 500;
      z-index: 1000;
      font-size: 0.85rem;
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
        border-radius: 28px;
      }
      .user-area {
        justify-content: space-between;
      }
      .script-title {
        font-size: 1.1rem;
      }
      .btn-copy, .btn-delete-script {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<!-- Login form -->
<div id="loginScreen" class="login-container">
  <div class="login-card glass">
    <div class="logo-wrapper">
      <div class="monkey-logo">🐒</div>
      <div class="brand-name">HGB VN</div>
      <div class="brand-sub">✦ ROBLOX SCRIPT HUB ✦</div>
    </div>
    <input type="text" id="loginUser" placeholder="Tài khoản" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Mật khẩu">
    <button id="doLogin" class="btn-gold">Đăng nhập</button>
    <div id="loginMsg" class="error-text"></div>
    <div style="margin-top: 18px; font-size: 0.7rem; opacity: 0.7;">🔑 Khách: hgbfree / 123456 &nbsp;|&nbsp; 👑 Admin: hoangbao2k11</div>
  </div>
</div>

<!-- Dashboard chính -->
<div id="dashboard" class="dashboard">
  <div class="top-bar">
    <div class="logo-small">
      <span>🐒</span>
      <h3>HGB VN</h3>
    </div>
    <div class="user-area">
      <span id="currentUserName">Khách</span>
      <span id="roleChip" class="admin-tag">👤</span>
      <button id="logoutBtn" class="btn-outline-light" style="padding: 5px 14px;">Thoát</button>
    </div>
  </div>

  <div class="section-title">
    <span>📜 Kho script Roblox</span>
    <span style="font-size: 0.7rem; font-weight: normal;">(sao chép dễ dàng)</span>
  </div>

  <div id="scriptsList" class="script-grid">
    <!-- dynamic scripts -->
  </div>

  <!-- Admin zone (chỉ hiện khi admin) -->
  <div id="adminZone" style="display: none;">
    <div class="admin-panel">
      <h3 style="margin-bottom: 12px;">✚ Thêm script mới</h3>
      <div class="form-group">
        <input type="text" id="newTitle" placeholder="Tên script (VD: Auto Farm, Hub, etc)" style="border-radius: 40px;">
        <input type="text" id="newDesc" placeholder="Mô tả ngắn gọn">
        <textarea rows="3" id="newCode" placeholder="Dán code Lua (Roblox) vào đây..."></textarea>
        <div class="row-btns">
          <button id="addScriptBtn" class="btn-gold" style="background: #1f6e5c;">➕ Thêm script</button>
          <button id="toggleLogsBtn" class="btn-outline-light">🗑️ Xem log đã xóa</button>
        </div>
      </div>
    </div>

    <div id="logPanel" style="display: none;" class="log-box">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <strong>📋 Nhật ký script đã xóa</strong>
        <button id="closeLogPanel" style="background: none; border: none; color: #ffb347; font-size: 1.2rem; cursor: pointer;">✖</button>
      </div>
      <div id="logsContainer" style="max-height: 250px; overflow-y: auto; margin-top: 8px;"></div>
    </div>
  </div>
</div>

<script>
  // -------------------- STORAGE KEYS --------------------
  const STORAGE_SCRIPTS = 'hgb_scripts_data';
  const STORAGE_DELETED_LOGS = 'hgb_deleted_logs';
  const STORAGE_SESSION = 'hgb_session';   // lưu phiên đăng nhập

  // Mẫu script mặc định - tập trung vào Roblox (không còn Blox Fruits cụ thể)
  const defaultScripts = [
    { id: "s1", title: "🚀 Auto Farm & Collect", description: "Tự động farm vật phẩm, tiền, EXP trong nhiều game Roblox", code: "-- Auto Farm Universal\nlocal player = game.Players.LocalPlayer\nwhile wait(0.2) do\n-- code auto farm\nend" },
    { id: "s2", title: "✨ Hub All Game (Orion/Mobile)", description: "Hỗ trợ nhiều script hub phổ biến như Orion, Dex, etc", code: "-- Load Hub\nloadstring(game:HttpGet('https://example.com/hub'))()\n-- Chạy an toàn" },
    { id: "s3", title: "🔧 Admin Panel & Tools", description: "Công cụ admin cho game Roblox, kick/ban/tp", code: "-- Admin Commands\nlocal admin = loadstring(game:HttpGet('https://pastebin.com/raw/admin'))()\nadmin:Enable()" }
  ];

  // Helper
  function loadScripts() {
    let stored = localStorage.getItem(STORAGE_SCRIPTS);
    if (!stored) {
      localStorage.setItem(STORAGE_SCRIPTS, JSON.stringify(defaultScripts));
      return [...defaultScripts];
    }
    try { return JSON.parse(stored); } catch(e) { return [...defaultScripts]; }
  }

  function saveScripts(scripts) {
    localStorage.setItem(STORAGE_SCRIPTS, JSON.stringify(scripts));
  }

  function loadLogs() {
    let logs = localStorage.getItem(STORAGE_DELETED_LOGS);
    if (!logs) return [];
    try { return JSON.parse(logs); } catch(e) { return []; }
  }

  function saveLogs(logs) {
    localStorage.setItem(STORAGE_DELETED_LOGS, JSON.stringify(logs));
  }

  function addDeletedLog(scriptObj, deletedBy) {
    const logs = loadLogs();
    logs.unshift({
      id: scriptObj.id,
      title: scriptObj.title,
      description: scriptObj.description,
      deletedAt: new Date().toLocaleString('vi-VN'),
      deletedBy: deletedBy
    });
    if (logs.length > 50) logs.pop();
    saveLogs(logs);
  }

  // ---------- QUẢN LÝ PHIÊN ĐĂNG NHẬP (persist login) ----------
  function saveSession(username, role) {
    const sessionData = {
      username: username,
      role: role,
      timestamp: Date.now()
    };
    localStorage.setItem(STORAGE_SESSION, JSON.stringify(sessionData));
  }

  function loadSession() {
    const raw = localStorage.getItem(STORAGE_SESSION);
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch(e) {
      return null;
    }
  }

  function clearSession() {
    localStorage.removeItem(STORAGE_SESSION);
  }

  let currentRole = null;   // 'guest' or 'admin'
  let currentUser = '';

  // Render danh sách script (khách chỉ xem + copy, admin có thêm xóa)
  function renderScripts() {
    const scripts = loadScripts();
    const container = document.getElementById('scriptsList');
    if (!container) return;
    if (scripts.length === 0) {
      container.innerHTML = `<div style="background: rgba(0,0,0,0.4); border-radius: 1.5rem; padding: 2rem; text-align: center;">✨ Chưa có script nào. Admin hãy thêm nhé!</div>`;
      return;
    }

    let html = '';
    scripts.forEach(script => {
      const isAdmin = (currentRole === 'admin');
      html += `
        <div class="script-card" data-id="${script.id}">
          <div class="script-header">
            <span class="script-title">${escapeHtml(script.title)}</span>
            ${isAdmin ? `<button class="btn-delete-script delete-script" data-id="${script.id}">🗑️ Xóa</button>` : ''}
          </div>
          <div class="script-desc">📌 ${escapeHtml(script.description)}</div>
          <div class="code-area"><pre style="margin:0; font-family:monospace; white-space:pre-wrap;">${escapeHtml(script.code)}</pre></div>
          <div class="card-buttons">
            <button class="btn-copy copy-btn" data-code="${escapeHtml(script.code).replace(/"/g, '&quot;')}">📋 Sao chép script</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // copy event
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const code = btn.getAttribute('data-code');
        if (code) {
          navigator.clipboard.writeText(code).then(() => showToast("✅ Đã sao chép script!")).catch(() => showToast("⚠️ Lỗi copy"));
        }
      });
    });

    // delete event (admin)
    if (currentRole === 'admin') {
      document.querySelectorAll('.delete-script').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.getAttribute('data-id');
          if (id && confirm("❌ Xóa script này? Lưu log xóa.")) {
            deleteScriptById(id);
          }
        });
      });
    }
  }

  function deleteScriptById(id) {
    let scripts = loadScripts();
    const scriptToDel = scripts.find(s => s.id === id);
    if (!scriptToDel) return;
    addDeletedLog(scriptToDel, currentUser);
    const newScripts = scripts.filter(s => s.id !== id);
    saveScripts(newScripts);
    renderScripts();
    showToast(`🗑️ Đã xóa "${scriptToDel.title}"`);
    // Nếu log panel đang mở, refresh nội dung
    const logPanel = document.getElementById('logPanel');
    if (logPanel && logPanel.style.display === 'block') {
      renderLogList();
    }
  }

  function renderLogList() {
    const logs = loadLogs();
    const logContainer = document.getElementById('logsContainer');
    if (!logContainer) return;
    if (logs.length === 0) {
      logContainer.innerHTML = '<div class="log-item">📭 Chưa có script nào bị xóa.</div>';
      return;
    }
    let html = '';
    logs.forEach(log => {
      html += `<div class="log-item">
        <strong>🗑️ ${escapeHtml(log.title)}</strong><br>
        📄 ${escapeHtml(log.description.substring(0, 80))}<br>
        ⏱️ ${log.deletedAt} — bởi ${log.deletedBy}
      </div>`;
    });
    logContainer.innerHTML = html;
  }

  // admin thêm script
  function addNewScript() {
    if (currentRole !== 'admin') {
      showToast("Chỉ admin mới có quyền thêm script");
      return;
    }
    const title = document.getElementById('newTitle').value.trim();
    const desc = document.getElementById('newDesc').value.trim();
    const code = document.getElementById('newCode').value.trim();
    if (!title || !code) {
      showToast("Vui lòng nhập tên và nội dung script!");
      return;
    }
    const scripts = loadScripts();
    const newId = 'scr_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    scripts.push({
      id: newId,
      title: title,
      description: desc || "Không có mô tả",
      code: code
    });
    saveScripts(scripts);
    renderScripts();
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    document.getElementById('newCode').value = '';
    showToast("✨ Thêm script thành công!");
  }

  function showToast(msg) {
    let existing = document.querySelector('.toast');
    if (existing) existing.remove();
    let div = document.createElement('div');
    div.className = 'toast';
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2200);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ---------- ĐĂNG NHẬP & KHỞI TẠO DASHBOARD ----------
  function attemptLogin(username, password, isAutoRestore = false) {
    // guest
    if (username === 'hgbfree' && password === '123456') {
      currentRole = 'guest';
      currentUser = 'hgbfree';
      if (!isAutoRestore) saveSession(currentUser, currentRole);
      initDashboard();
      return true;
    }
    // admin
    if (username === 'hoangbao2k11' && password === 'bao@20TN') {
      currentRole = 'admin';
      currentUser = 'hoangbao2k11';
      if (!isAutoRestore) saveSession(currentUser, currentRole);
      initDashboard();
      return true;
    }
    return false;
  }

  function initDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    const dashboard = document.getElementById('dashboard');
    dashboard.style.display = 'block';

    document.getElementById('currentUserName').innerText = currentUser;
    const roleChip = document.getElementById('roleChip');
    const adminZoneDiv = document.getElementById('adminZone');

    if (currentRole === 'admin') {
      roleChip.innerText = '👑 ADMIN';
      roleChip.style.background = '#FF7A2C';
      adminZoneDiv.style.display = 'block';
      // gán sự kiện admin (tránh trùng lặp)
      const addBtn = document.getElementById('addScriptBtn');
      if (addBtn) {
        const newAdd = addBtn.cloneNode(true);
        addBtn.parentNode.replaceChild(newAdd, addBtn);
        newAdd.addEventListener('click', addNewScript);
      }
      const toggleBtn = document.getElementById('toggleLogsBtn');
      if (toggleBtn) {
        const newToggle = toggleBtn.cloneNode(true);
        toggleBtn.parentNode.replaceChild(newToggle, toggleBtn);
        newToggle.addEventListener('click', () => {
          const logPanel = document.getElementById('logPanel');
          if (logPanel.style.display === 'block') {
            logPanel.style.display = 'none';
          } else {
            renderLogList();
            logPanel.style.display = 'block';
          }
        });
      }
      const closeLog = document.getElementById('closeLogPanel');
      if (closeLog) {
        closeLog.addEventListener('click', () => {
          document.getElementById('logPanel').style.display = 'none';
        });
      }
      document.getElementById('logPanel').style.display = 'none';
    } else {
      roleChip.innerText = '👤 Khách (copy)';
      roleChip.style.background = '#2c2f48';
      adminZoneDiv.style.display = 'none';
    }
    renderScripts();
  }

  function logout() {
    clearSession();
    currentRole = null;
    currentUser = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginMsg').innerText = '';
  }

  // Xử lý sự kiện đăng nhập từ form
  function onLoginClick() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    const errDiv = document.getElementById('loginMsg');
    if (!username || !password) {
      errDiv.innerText = "Nhập đầy đủ tài khoản/mật khẩu";
      return;
    }
    const success = attemptLogin(username, password, false);
    if (!success) {
      errDiv.innerText = "Sai tài khoản hoặc mật khẩu!";
    }
  }

  // ---------- KHỞI TẠO TRANG: KIỂM TRA SESSION LƯU SẴN ----------
  window.addEventListener('DOMContentLoaded', () => {
    // Khởi tạo storage mặc định nếu chưa có
    if (!localStorage.getItem(STORAGE_SCRIPTS)) {
      localStorage.setItem(STORAGE_SCRIPTS, JSON.stringify(defaultScripts));
    }
    if (!localStorage.getItem(STORAGE_DELETED_LOGS)) {
      localStorage.setItem(STORAGE_DELETED_LOGS, JSON.stringify([]));
    }

    // Kiểm tra session đã lưu
    const session = loadSession();
    if (session && session.username && session.role) {
      let isValid = false;
